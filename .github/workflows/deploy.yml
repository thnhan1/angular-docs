name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - main  # Deploy khi push vào branch main

  # Cho phép chạy thủ công từ Actions tab
  workflow_dispatch:

# Quyền cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Đảm bảo chỉ chạy 1 deployment cùng lúc
# Nếu có deploy đang chạy, skip deploy cũ thay vì cancel
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Job 1: Build VitePress site
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Cần để VitePress lấy đúng git history (lastUpdated)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm install

      - name: Build VitePress site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist  # Thư mục output mặc định của VitePress

  # Job 2: Deploy lên GitHub Pages (chỉ chạy sau khi build thành công)
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
